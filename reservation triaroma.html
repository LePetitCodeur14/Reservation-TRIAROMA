<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation Hôtel TRIAROMA</title>
	<meta name="author" content="RAPH14" >
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border: none;
            background-color: #2c7be5;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5edb;
        }

        #resultat {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: green;
        }

        #prix {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Réservation TRIAROMA</h2>

    <form id="formReservation">
        <label>Prénom :</label>
        <input type="text" id="prenom" required>

        <label>Nom :</label>
        <input type="text" id="nom" required>

        <label>Email :</label>
        <input type="email" id="email" required>

        <label>Nombre de nuits :</label>
        <input type="number" id="nuits" min="1" required>

        <div id="prix"></div>

        <button type="submit">Réserver</button>
    </form>

    <div id="resultat"></div>
</div>

<script>
    const prixParNuit = 199;

    const nuitsInput = document.getElementById("nuits");
    const prixDiv = document.getElementById("prix");
    const form = document.getElementById("formReservation");
    const resultat = document.getElementById("resultat");

    nuitsInput.addEventListener("input", function() {
        const nuits = nuitsInput.value;
        if (nuits > 0) {
            const total = nuits * prixParNuit;
            prixDiv.textContent = "Prix total : " + total + " €";
        } else {
            prixDiv.textContent = "";
        }
    });

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        const prenom = document.getElementById("prenom").value;
        const nom = document.getElementById("nom").value;
        const email = document.getElementById("email").value;
        const nuits = document.getElementById("nuits").value;

        if (prenom && nom && email && nuits) {
            resultat.textContent = "Merci d'avoir réservé chez TRIAROMA !";
            form.reset();
            prixDiv.textContent = "";
        }
    });
</script>

</body>
</html>
